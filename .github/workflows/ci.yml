name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GOTOOLCHAIN: local

jobs:
  quality:
    name: Test, shuffle, and vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true
      - name: Prepare exact dependency worktrees
        run: scripts/ci-prepare-dependencies.sh
      - name: Test
        run: go test ./...
      - name: Shuffle
        run: go test -shuffle=on -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Enforce source boundaries
        run: scripts/check-source-boundaries.sh

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true
      - name: Prepare exact dependency worktrees
        run: scripts/ci-prepare-dependencies.sh
      - name: Race and shuffle
        run: go test -race -shuffle=on -count=1 ./...
      - name: Repeated scheduled race
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: go test -race -shuffle=on -count=5 ./...

  fuzz-smoke:
    name: Discovered fuzz smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true
      - name: Prepare exact dependency worktrees
        run: scripts/ci-prepare-dependencies.sh
      - name: Run every discovered fuzz target
        run: FUZZTIME=1s scripts/fuzz-smoke.sh

  portability:
    name: Checkptr and 386
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true
      - name: Prepare exact dependency worktrees
        run: scripts/ci-prepare-dependencies.sh
      - name: Strict pointer instrumentation
        run: scripts/ci-checkptr.sh
      - name: 386 backend-neutral coverage and full blocker check
        run: scripts/ci-386.sh
